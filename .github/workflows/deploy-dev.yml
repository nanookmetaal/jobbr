name: Deploy to dev

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Deploy via SSH tunnel
        env:
          SSH_KEY: ${{ secrets.DEV_SSH_KEY }}
          CF_TOKEN_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_TOKEN_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          SSH_HOST: ssh.dev.yourdomain.com
          SSH_USER: ${{ secrets.DEV_SSH_USER }}
          REPO_PATH: ${{ secrets.DEV_REPO_PATH }}
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          ssh -o StrictHostKeyChecking=no \
              -o ProxyCommand="cloudflared access ssh --hostname $SSH_HOST --id $CF_TOKEN_ID --secret $CF_TOKEN_SECRET" \
              -i /tmp/deploy_key \
              $SSH_USER@$SSH_HOST \
              "cd $REPO_PATH && ./deploy/deploy.sh"
