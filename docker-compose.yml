services:
  db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: jobbr
      POSTGRES_PASSWORD: jobbr
      POSTGRES_DB: jobbr
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobbr"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      # Overrides DATABASE_URL in .env to point at the db service
      DATABASE_URL: postgresql+asyncpg://jobbr:jobbr@db:5432/jobbr
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the Next.js build - must be the public-facing API URL
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./deploy/cloudflared:/etc/cloudflared
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
